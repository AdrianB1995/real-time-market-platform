name: Multi-Service Java CI/CD (Gradle)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  # Detect which services changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      ingestion-service: ${{ steps.changes.outputs.ingestion-service }}
      processing-service: ${{ steps.changes.outputs.processing-service }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            ingestion-service:
              - 'ingestion-service/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - '.github/workflows/ci-cd.yml'
            processing-service:
              - 'processing-service/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - '.github/workflows/ci-cd.yml'

  # Lint and quick checks (fail-fast)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Check formatting and lint
        run: ./gradlew check --continue

  # Build and test ingestion-service (parallel)
  build-ingestion-service:
    needs: [ changes, lint ]
    if: ${{ needs.changes.outputs.ingestion-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build ingestion-service
        run: ./gradlew :ingestion-service:build -x test
      - name: Test ingestion-service
        run: ./gradlew :ingestion-service:test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ingestion-service-test-reports
          path: ingestion-service/build/reports/tests/test/
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: ingestion-service-jar
          path: ingestion-service/build/libs/

  # Build and test processing-service (parallel)
  build-processing-service:
    needs: [ changes, lint ]
    if: ${{ needs.changes.outputs.processing-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build processing-service
        run: ./gradlew :processing-service:build -x test
      - name: Test processing-service
        run: ./gradlew :processing-service:test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: processing-service-test-reports
          path: processing-service/build/reports/tests/test/
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: processing-service-jar
          path: processing-service/build/libs/

  # Deploy ingestion-service
  deploy-ingestion-service:
    needs: [ changes, build-ingestion-service ]
    if: |
      success() &&
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' &&
      needs.changes.outputs.ingestion-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: ingestion-service-jar
      - name: Deploy ingestion-service
        run: echo "Deploying ingestion-service JAR to cloud provider..."

  # Deploy processing-service
  deploy-processing-service:
    needs: [ changes, build-processing-service ]
    if: |
      success() &&
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' &&
      needs.changes.outputs.processing-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: processing-service-jar
      - name: Deploy processing-service
        run: echo "Deploying processing-service JAR to cloud provider..."